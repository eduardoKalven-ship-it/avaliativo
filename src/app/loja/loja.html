<section class="banner">

    <h1>
        MOTOS PROJETADAS PARA
        <span>GRANDES AVENTURAS</span>
    </h1>

    <div class="categorias">
        <button class="ativo">Esportivas</button>
        
    </div>

    @for (produto of produtos; track produto.id) {

    <div class="conteudo">

        <h2>{{ produto.nome }}</h2>

        <img [src]="produto.imgs[0]" alt="Moto">

        <div class="info">

            <h3>{{ produto.nome }}</h3>

            <p>{{ produto.descricao }}</p>

            <h4>
                R$ {{ produto.preco }}
            </h4>

            <span>
                Estoque: {{ produto.estoque }}
            </span>

            <button class="btn">
                Comprar
            </button>

        </div>

    </div>

    }

</section>
