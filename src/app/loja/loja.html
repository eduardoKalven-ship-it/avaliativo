<div>
    <section class="produtos">

        @for (produto of produtos; track produto.id ){
        <div class="card">
            <img src=""
                alt="R1">
            <h3>{{ produto.nome  }}</h3>
            <h3>{{ produto.preco }}</h3>
            <h3>{{ produto.imgs }}</h3>
            <h3>{{ produto.descricao }}</h3>
            
            <button 
                (click)="adicionarAoCarrinho(produto)">Comprar
            </button>

            }
